# ------------------------------
# Site settings
# ------------------------------
locale: "en-GB"
title: "Yunda Yan"
title_separator: "-"
subtitle: "Lecturer in Robotics and AI"
name: "Yunda Yan"
description: "Academic homepage of Dr Yunda Yan"
url: "https://YundaYan.github.io"
baseurl: ""
repository: "YundaYan/YundaYan.github.io"

teaser:
logo:
masthead_title: "Yunda Yan"

# ------------------------------
# Author
# ------------------------------
author:
  avatar: "profile.jpg"
  name: "Yunda Yan"
  pronouns:
  bio: "Assistant Professor in Robotics and AI <br> Senior Member, IEEE (SMIEEE) <br> Fellow of the Higher Education Academy (FHEA)"
  location: "London, United Kingdom"
  employer: "University College London (UCL)"
  uri: "https://profiles.ucl.ac.uk/95124-yunda-yan"
   email: "yunda.yan@ucl.ac.uk"

  # Academic profiles
  googlescholar: "https://scholar.google.com/citations?user=s9IOtoMAAAAJ&hl=en"
  orcid: "https://orcid.org/0000-0002-2839-6778"
 #  github: "YundaYan"
  researchgate: "https://www.researchgate.net/profile/Yunda-Yan"
  linkedin: "yunda-yan-a72a851b7"
  

# ------------------------------
# Publication categories
# ------------------------------
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# ------------------------------
# Reading files
# ------------------------------
include:
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

# ------------------------------
# Build settings
# ------------------------------
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: Europe/London

minimal_mistakes_skin: "default"
search: true
search_full_content: true

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author_profile: true
breadcrumbs: false
future: true

# ------------------------------
# Defaults
# ------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# ------------------------------
# Collections
# ------------------------------
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publication/:path/
  talks:
    output: true
    permalink: /talks/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/

# ------------------------------
# Analytics (optional)
# ------------------------------
analytics:
  provider: false

# ------------------------------
# Comments / social sharing
# ------------------------------
comments:
  provider: false
social:
  type:
  name: "Yunda Yan"
  links:
    - "https://profiles.ucl.ac.uk/95124-yunda-yan"
    - "https://github.com/YundaYan"
